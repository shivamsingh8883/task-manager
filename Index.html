<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center text-gray-200">
    <div class="border flex items-center justify-center rounded">
        
        <div class="">
            <h1 class="flex items-center justify-center m-5">Task Manager</h1>
            <h2 class="flex items-center justify-center m-5">Add or delete your Tasks Here!</h2>
            <div id="task_list" class="m-7 p-2">

            </div>
            <div class="m-5 flex items-center justify-center">
                <input id="input-area" class="bg-gray-800 border rounded p-2 m-5" for="input" placeholder="Enter Task"></>
                <button id="addbutton" class="m-2 border rounded p-1">Add</button>
            </div>
            
        </div>
        <script src="./script.js"></script>
    </body>
    </html>
